name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build

  e2e:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  container:
    name: Container smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - run: cp .env.production.example .env.production
      - run: docker compose config --quiet
      - run: docker build --tag physics-learning-agent:ci .
      - name: Start standalone container
        run: |
          docker run --detach \
            --name physics-learning-agent-ci \
            --publish 127.0.0.1:3101:3000 \
            --env DEEPSEEK_API_KEY= \
            physics-learning-agent:ci
      - name: Verify readiness
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3101/api/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs physics-learning-agent-ci
          exit 1
      - name: Stop container
        if: always()
        run: docker rm --force physics-learning-agent-ci || true
