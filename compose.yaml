services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: physics-learning-agent:pilot
    restart: unless-stopped
    init: true
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      PLA_DATA_DIR: /data
    volumes:
      - pla-data:/data
    expose:
      - "3000"
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pla-data:
    name: pla-pilot-data
  caddy-data:
    name: pla-caddy-data
  caddy-config:
    name: pla-caddy-config
